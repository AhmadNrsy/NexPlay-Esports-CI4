[phases.setup]
nixPkgs = ["php83", "php83Extensions.intl", "php83Extensions.mbstring", "php83Extensions.curl", "php83Extensions.xml", "php83Extensions.zip", "composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"

[variables]
NIXPACKS_PHP_VERSION = "8.3"
